name: Update KRX Market Data

on:
  workflow_dispatch:
    inputs:
      krx_cookie:
        description: "KRX Cookie (Request Headers의 Cookie 전체)"
        required: true
        type: string
      yyyymmdd:
        description: "기준일 (YYYYMMDD, 비우면 오늘)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect ETF/KOSPI data
        env:
          KRX_TODAY: ${{ inputs.yyyymmdd }}
        run: python price_data_collect.py

      - name: Collect sector PBR data
        env:
          KRX_COOKIE: ${{ inputs.krx_cookie }}
          KRX_TODAY: ${{ inputs.yyyymmdd }}
        run: python krx_pbr_pipeline.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kodex_sector_etf_close.csv kospi_daily.csv krx_sector_pbr.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          run_date="${{ inputs.yyyymmdd }}"
          if [ -z "$run_date" ]; then
            run_date=$(date +%Y%m%d)
          fi
          git commit -m "chore(data): update market data ${run_date}"
          git push
